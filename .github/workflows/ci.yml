name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a PR is updated — saves CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Biome — lint + format check
        run: npm run lint

      - name: TypeScript — typecheck
        run: npm run typecheck

      - name: Vitest — unit + component tests
        run: npm test -- --run

      - name: Next.js — production build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://portfolio.vercel.app
          NEXT_PUBLIC_GITHUB_USER: ipelengmekgwe
          GITHUB_EXCLUDE_OWNERS: EAMS-Technologies,FTSI-Web
